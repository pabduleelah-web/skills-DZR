<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فعاليات كأس العالم 2026</title>
    <style>
        :root {
            --primary: #0b0e14;
            --accent: #d4af37;
            --bg: #121620;
            --card-bg: #1b2230;
            --text: #ffffff;
            --text-secondary: #8b9bb4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(rgba(11, 14, 20, 0.85), rgba(11, 14, 20, 0.98)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200') center/cover;
            color: white;
            text-align: center;
            padding: 50px 20px;
            border-bottom: 3px solid var(--accent);
        }
        header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: var(--accent);
        }
        nav {
            background-color: var(--primary);
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        nav button {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
        nav button.active, nav button:hover {
            background-color: var(--accent);
            color: #000000;
        }
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2c3547;
        }
        .card h2 {
            color: var(--accent);
            border-bottom: 2px solid #2c3547;
            padding-bottom: 12px;
            margin-top: 0;
        }
        .page { display: none; }
        .page.active { display: block; }
        
        /* تصميم المجموعات الديناميكية */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .table-container {
            background: #161c27;
            border: 1px solid #2c3547;
            border-radius: 8px;
            padding: 12px;
        }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #2c3547; }
        
        /* المباريات الحية */
        .matches-list { display: flex; flex-direction: column; gap: 12px; }
        .match-card {
            display: flex; justify-content: space-between; align-items: center;
            background: #161c27; padding: 15px 20px; border-radius: 8px;
        }
        .match-score { background: #0b0e14; padding: 6px 15px; border-radius: 6px; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>🏆 بطولة كأس العالم FIFA 2026 🏆</h1>
    <p>تحديثات تلقائية حية للمجموعات والمباريات</p>
</header>

<nav>
    <button id="btn-p1" class="active" onclick="switchPage(1)">📰 أخبار ومشاركات</button>
    <button id="btn-p2" onclick="switchPage(2)">📊 المجموعات والمباريات الحية</button>
</nav>

<div class="main-container">
    <!-- صفحة التفاعل والتوقعات والأخبار -->
    <div id="p1" class="page active">
        <!-- تظهر فيها النماذج السابقة وحائط التوقعات المكتوبة من الأعضاء الـ 95 -->
        <div class="card">
            <h2>🗳️ توقع مواجهات اليوم</h2>
            <p>يمكن للأعضاء كتابة توقعاتهم هنا بشكل طبيعي كما في التصميم السابق.</p>
        </div>
    </div>

    <!-- صفحة المجموعات والمباريات التي تسحب البيانات تلقائياً -->
    <div id="p2" class="page">
        <div class="card">
            <h2>📅 مباريات اليوم الحية (تحديث تلقائي)</h2>
            <div class="matches-list" id="liveMatches">
                <p style="color: var(--text-secondary);">جاري سحب المباريات الحالية...</p>
            </div>
        </div>

        <div class="card">
            <h2>📊 الترتيب المباشر للمجموعات</h2>
            <div class="groups-grid" id="liveGroups">
                <p style="color: var(--text-secondary);">جاري جلب ترتيب المجموعات المباشر...</p>
            </div>
        </div>
    </div>
</div>

<script>
    function switchPage(pageNum) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`p${pageNum}`).classList.add('active');
        document.getElementById(`btn-p${pageNum}`).classList.add('active');
        
        if(pageNum === 2) {
            fetchWorldCupData();
        }
    }

    // لربط موقعك التلقائي: سجل مجاناً في موقع football-data.org وضع الرمز الخاص بك هنا
    const API_TOKEN = 'ضع_هنا_مفتاح_الـ_API_الخاص_بك'; 
    const COMPETITION_CODE = 'WC'; // رمز بطولة كأس العالم في النظام الدولي

    async function fetchWorldCupData() {
        if(API_TOKEN === 'ضع_هنا_مفتاح_الـ_API_الخاص_بك') {
            document.getElementById('liveMatches').innerHTML = '<p style="color: #e74c3c;">تنبيه للمسؤول: يرجى وضع مفتاح الـ API في الكود لتفعيل جلب البيانات التلقائي.</p>';
            return;
        }

        try {
            // 1. جلب المباريات الحية واليومية
            let matchResponse = await fetch(`https://api.football-data.org/v4/competitions/${COMPETITION_CODE}/matches`, {
                headers: { 'X-Auth-Token': API_TOKEN }
            });
            let matchData = await matchResponse.json();
            renderLiveMatches(matchData.matches);

            // 2. جلب جدول ترتيب المجموعات المحدث
            let standingsResponse = await fetch(`https://api.football-data.org/v4/competitions/${COMPETITION_CODE}/standings`, {
                headers: { 'X-Auth-Token': API_TOKEN }
            });
            let standingsData = await standingsResponse.json();
            renderLiveGroups(standingsData.standings);

        } catch (error) {
            console.error("خطأ في جلب البيانات: ", error);
        }
    }

    function renderLiveMatches(matches) {
        const container = document.getElementById('liveMatches');
        container.innerHTML = '';
        
        // تصفية مباريات اليوم أو الجارية حالياً
        if(!matches || matches.length === 0) {
            container.innerHTML = '<p>لا توجد مباريات مجدولة لليوم.</p>';
            return;
        }

        matches.slice(0, 5).forEach(match => {
            const card = document.createElement('div');
            card.className = 'match-card';
            let score = match.score.fullTime.home !== null ? `${match.score.fullTime.home} - ${match.score.fullTime.away}` : 'VS';
            card.innerHTML = `
                <span style="font-weight:bold;">${match.homeTeam.name}</span>
                <span class="match-score">${score}</span>
                <span style="font-weight:bold;">${match.awayTeam.name}</span>
            `;
            container.appendChild(card);
        });
    }

    function renderLiveGroups(standings) {
        const container = document.getElementById('liveGroups');
        container.innerHTML = '';

        if(!standings) return;

        standings.forEach(groupData => {
            const tableContainer = document.createElement('div');
            tableContainer.className = 'table-container';
            
            let rowsHTML = '';
            groupData.table.forEach(row => {
                rowsHTML += `
                    <tr>
                        <td style="text-align:right; font-weight:bold;">${row.team.name}</td>
                        <td>${row.playedGames}</td>
                        <td style="color:var(--accent); font-weight:bold;">${row.points}</td>
                    </tr>
                `;
            });

            tableContainer.innerHTML = `
                <h3 style="margin:0 0 10px 0; text-align:center; color:var(--accent);">${groupData.group.replace('GROUP_', 'المجموعة ')}</h3>
                <table>
                    <thead><tr><th style="text-align:right;">المنتخب</th><th>لعب</th><th>نقاط</th></tr></thead>
                    <tbody>${rowsHTML}</tbody>
                </table>
            `;
            container.appendChild(tableContainer);
        });
    }
</script>
</body>
</html>
